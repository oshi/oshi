name: Native Comparison (JNA vs FFM)

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  compare:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    name: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'zulu'
          cache: 'maven'
      - name: Build dependencies
        run: ./mvnw install -DskipTests -pl oshi-common,oshi-core,oshi-core-java25 -am -q
      - name: Run native comparison
        run: ./mvnw test -pl oshi-benchmark -Pnative-comparison -B
