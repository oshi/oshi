---
# Temporary probe workflow: verifies JDK 25 is installable on OpenIndiana
# before committing to the Solaris FFM port. Will be deleted once we have
# an answer. If `pkg install openjdk25` fails, the diagnostic step below
# lists available openjdk packages so we can pick a working name.
name: OpenIndiana JDK 25 probe

on:
  push:
    branches:
      - solaris-ffm
  workflow_dispatch:

jobs:
  probe:
    name: Probe JDK 25 on OpenIndiana
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Probe JDK 25 on OpenIndiana
        uses: vmactions/openindiana-vm@5ecd04945b8ac6c9b82248324912326a4d065094 # v1
        with:
          prepare: |
            # Show what openjdk* package names exist before trying anything.
            echo "=== Available openjdk packages ==="
            pkg search -r openjdk || true
            echo "=== Attempting pkg install openjdk25 ==="
            pkg install openjdk25 || {
              echo "openjdk25 install failed; falling back to listing all java runtimes"
              pkg list -a 'runtime/java/*' || true
              exit 1
            }
          run: |
            export JAVA_HOME=/usr/jdk/openjdk25
            export PATH=$JAVA_HOME/bin:$PATH
            echo "=== java -version ==="
            java -version
            echo "=== javac -version ==="
            javac -version
            echo "=== JDK contents ==="
            ls -la /usr/jdk/ || true
            ls -la "$JAVA_HOME"/bin | head -20 || true
            # Verify oshi-core-ffm (and its deps) compile with JDK 25.
            # Don't run tests yet; just confirm the FFM module bytecode is buildable.
            echo "=== Compiling oshi-core-ffm ==="
            ./mvnw -pl oshi-core-ffm -am compile -B \
              -Djacoco.skip=true -Dmaven.gitcommitid.skip=true
