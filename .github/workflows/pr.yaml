# Limited CI matrix on all pull requests to any branch
name: Pull Request CI

on:
  pull_request:
    # `labeled` lets the `full-coverage` label trigger a run immediately (no re-push);
    # the other types are the default set.
    types: [opened, synchronize, reopened, labeled]
    paths-ignore:
      - '**.md'
      - '**.yml'
      - '**.yaml'

permissions:
  contents: read

jobs:
  # Detect whether this PR touches Unix-platform code or the build infrastructure.
  # The nested-VM Unix coverage jobs (freebsd/openbsd/openindiana) are gated on this
  # so an unrelated PR doesn't spin up slow VMs. Generic shared source is covered by
  # the always-on ubuntu/mac/windows jobs, Codecov carryforward, and the authoritative
  # master run. A `full-coverage` label overrides the gate to force the VM jobs on.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      unix: ${{ steps.filter.outputs.unix }}
    steps:
      - name: Detect Unix-relevant changes
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! CHANGED=$(gh pr view "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" --json files --jq '.files[].path'); then
            # Fail safe: if the file list can't be read, run the Unix jobs rather than
            # silently skip them and drop coverage.
            echo "Could not read changed files; defaulting to running the Unix jobs"
            echo "unix=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Changed files:"; echo "$CHANGED"
          # Run the Unix VM jobs when Unix-platform code (any `unix/` path segment across
          # oshi-common/oshi-core: hardware, software, driver, util, ffm, jna) or build
          # infrastructure (any pom.xml, the Maven wrapper) changes.
          if echo "$CHANGED" | grep -qE '(^|/)unix/|(^|/)pom\.xml$|^\.mvn/|^mvnw'; then
            echo "unix=true" >> "$GITHUB_OUTPUT"
          else
            echo "unix=false" >> "$GITHUB_OUTPUT"
          fi

  # Static analysis: formatting, style, API restrictions, and javadoc link validity.
  # Runs once on ubuntu/JDK 25 (javadoc for oshi-core-ffm requires JDK 25).
  lint:
    runs-on: ubuntu-latest
    name: Lint (Spotless, Checkstyle, ForbiddenAPIs, Javadoc)
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: 25
          distribution: 'zulu'
          cache: 'maven'
      - name: Install
        run: ./mvnw install -DskipTests -q
      - name: Spotless
        run: ./mvnw spotless:check
      - name: Checkstyle
        run: ./mvnw checkstyle:check
      - name: Forbidden APIs
        run: ./mvnw forbiddenapis:check forbiddenapis:testCheck
      - name: Javadoc
        run: ./mvnw javadoc:javadoc -DskipTests
      - name: Verify SLF4J 1.7 API compatibility
        run: ./mvnw -Pverify-slf4j-17 clean compile

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      # Latest LTS (JDK 25) across all three OSes — this is the coverage + JNA==FFM
      # row (uploads linux/macos/windows flags). The version floor/ceiling checks
      # (JDK 21 and 26) run on ubuntu only; an OS-specific bug that is also
      # JDK-version-specific in a way ubuntu wouldn't catch is vanishingly rare.
      matrix:
        include:
          - os: ubuntu-latest
            java: 21
          - os: ubuntu-latest
            java: 25
            coverage-flag: linux
          - os: ubuntu-latest
            java: 26
          - os: macos-latest
            java: 25
            coverage-flag: macos
          - os: windows-latest
            java: 25
            coverage-flag: windows
      fail-fast: false
    name: Test JDK ${{ matrix.java }}, ${{ matrix.os }}${{ contains(matrix.java, '25') && ' (+ JNA==FFM)' || '' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'zulu'
          cache: 'maven'
      - name: Test with Maven
        if: ${{ !contains(matrix.java, '25') }}
        run: ./mvnw test -B
      - name: Test with Maven (Compare JNA/FFM and aggregate coverage)
        if: contains(matrix.java, '25')
        run: ./mvnw test -Paggregate-coverage -B
      - name: Upload Coverage
        if: always() && contains(matrix.java, '25')
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: ${{ matrix.coverage-flag }}

  # FreeBSD VM, JDK 25. Separate from the main matrix because vmactions/freebsd-vm
  # runs inside a nested VM on ubuntu-latest. Aggregate coverage is uploaded to
  # Codecov under the `freebsd` flag — this is the only PR job that exercises
  # the FreeBSD-specific classes.
  testfreebsd:
    runs-on: ubuntu-24.04
    name: Test JDK 25, FreeBSD (+ JNA==FFM)
    needs: changes
    if: >-
      needs.changes.outputs.unix == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-coverage')
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Test in FreeBSD with aggregate coverage
        id: test-freebsd
        uses: vmactions/freebsd-vm@77ed28d336d03fe19a3f4f7266c1d2c4714dd79d # v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg install -y curl
            pkg install -y openjdk25
          run: |
            export JAVA_HOME=/usr/local/openjdk25
            export PATH=$JAVA_HOME/bin:$PATH
            ./mvnw test -Paggregate-coverage -B
      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: freebsd

  # OpenBSD VM, JDK 25. Same pattern as FreeBSD above.
  testopenbsd:
    runs-on: ubuntu-24.04
    name: Test JDK 25, OpenBSD (+ JNA==FFM)
    needs: changes
    if: >-
      needs.changes.outputs.unix == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-coverage')
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Test on OpenBSD with aggregate coverage
        id: test-openbsd
        uses: vmactions/openbsd-vm@c941015845c0f0c429676840963dc63b226d4f69 # v1
        with:
          release: "7.9"
          usesh: false
          mem: 2048
          copyback: true
          prepare: |
            pkg_add curl
            pkg_add jdk%25
            pkg_add maven
          run: |
            mvn test -Paggregate-coverage -B
      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: openbsd

  # OpenIndiana (illumos/Solaris) VM, JDK 25. Same pattern as FreeBSD/OpenBSD above.
  # Bumped VM RAM and capped JVM heap so back-to-back module test runs (JNA + FFM)
  # don't exhaust illumos's native-memory pool.
  testopenindiana:
    runs-on: ubuntu-24.04
    name: Test JDK 25, OpenIndiana (+ JNA==FFM)
    needs: changes
    if: >-
      needs.changes.outputs.unix == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'full-coverage')
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Test on OpenIndiana with aggregate coverage
        id: test-openindiana
        uses: vmactions/openindiana-vm@3af32bfaa450c7c53b35b1da080564c85cac4ae8 # v1
        with:
          mem: 12288
          # Cap below the runner's core count: shrinks libumem's per-CPU arenas and
          # the JVM common ForkJoinPool (OSHI .parallel() streams), reducing the
          # thread fan-out that drives the native-memory OOMs.
          cpu: 2
          copyback: true
          prepare: |
            pkg install openjdk25
          run: |
            export JAVA_HOME=/usr/jdk/openjdk25
            export PATH=$JAVA_HOME/bin:$PATH
            # illumos OOMs here are native memory (thread stacks + GC/JIT/metaspace),
            # not Java heap. Cap every native pool that grows with thread fan-out and
            # use SerialGC (no parallel GC threads/structures) to keep the footprint flat.
            # _JAVA_OPTIONS reaches the Maven JVM and the forked test JVM alike.
            export _JAVA_OPTIONS="-Xmx1g -Xss512k -XX:MaxMetaspaceSize=256m -XX:ReservedCodeCacheSize=128m -XX:+UseSerialGC"
            # OpenIndiana-only: same parallelism cap as unix.yaml. illumos
            # libumem reserves per-CPU arenas; vthread-style unbounded fan-out
            # on blocking JNA exec calls trips Native memory allocation OOMs.
            ./mvnw clean test -Paggregate-coverage -B -Dmaven.gitcommitid.skip=true \
              -Djunit.parallel.executor-service=FORK_JOIN_POOL \
              -Djunit.parallel.strategy=fixed \
              -Djunit.parallel.fixed.parallelism=1 \
              -Djunit.parallel.fixed.max-pool-size=2
      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: solaris
