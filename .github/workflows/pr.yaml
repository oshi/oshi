# Limited CI matrix on all pull requests to any branch
name: Pull Request CI

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.yml'
      - '**.yaml'

jobs:
  # Static analysis: formatting, style, API restrictions, and javadoc link validity.
  # Runs once on ubuntu/JDK 25 (javadoc for oshi-core-java25 requires JDK 25).
  lint:
    runs-on: ubuntu-latest
    name: Lint (Spotless, Checkstyle, ForbiddenAPIs, Javadoc)
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'zulu'
          cache: 'maven'
      - name: Install
        run: ./mvnw install -DskipTests -q
      - name: Spotless
        run: ./mvnw spotless:check
      - name: Checkstyle
        run: ./mvnw checkstyle:check
      - name: Forbidden APIs
        run: ./mvnw forbiddenapis:check forbiddenapis:testCheck
      - name: Javadoc
        run: ./mvnw javadoc:javadoc javadoc:aggregate -DskipTests

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java: [11, 21, 25]
      fail-fast: false
    name: Test JDK ${{ matrix.java }}, ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'zulu'
          cache: 'maven'
      - name: Test with Maven
        run: ./mvnw test -B
      - name: Upload Coverage
        if: contains(matrix.java, '11')
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
