# Limited CI matrix on all pull requests to any branch
name: Pull Request CI

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.yml'
      - '**.yaml'

permissions:
  contents: read

jobs:
  # Static analysis: formatting, style, API restrictions, and javadoc link validity.
  # Runs once on ubuntu/JDK 25 (javadoc for oshi-core-ffm requires JDK 25).
  lint:
    runs-on: ubuntu-latest
    name: Lint (Spotless, Checkstyle, ForbiddenAPIs, Javadoc)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: 25
          distribution: 'zulu'
          cache: 'maven'
      - name: Install
        run: ./mvnw install -DskipTests -q
      - name: Spotless
        run: ./mvnw spotless:check
      - name: Checkstyle
        run: ./mvnw checkstyle:check
      - name: Forbidden APIs
        run: ./mvnw forbiddenapis:check forbiddenapis:testCheck
      - name: Javadoc
        run: ./mvnw javadoc:javadoc -DskipTests

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java: [21, 25, 26]
        include:
          - os: ubuntu-latest
            coverage-flag: linux
          - os: macos-latest
            coverage-flag: macos
          - os: windows-latest
            coverage-flag: windows
      fail-fast: false
    name: Test JDK ${{ matrix.java }}, ${{ matrix.os }}${{ contains(matrix.java, '25') && ' (+ JNA==FFM)' || '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'zulu'
          cache: 'maven'
      - name: Test with Maven
        if: ${{ !contains(matrix.java, '25') }}
        run: ./mvnw test -B
      - name: Test with Maven (Compare JNA/FFM and aggregate coverage)
        if: contains(matrix.java, '25')
        run: ./mvnw test -Paggregate-coverage -B
      - name: Upload Coverage
        if: always() && contains(matrix.java, '25')
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: ${{ matrix.coverage-flag }}

  # FreeBSD VM, JDK 25. Separate from the main matrix because vmactions/freebsd-vm
  # runs inside a nested VM on ubuntu-latest. Aggregate coverage is uploaded to
  # Codecov under the `freebsd` flag — this is the only PR job that exercises
  # the FreeBSD-specific classes.
  testfreebsd:
    runs-on: ubuntu-24.04
    name: Test JDK 25, FreeBSD (+ JNA==FFM)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Test in FreeBSD with aggregate coverage
        id: test-freebsd
        uses: vmactions/freebsd-vm@5a72679103d223925653750faa878a143340fbd0 # v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg install -y curl
            pkg install -y openjdk25
          run: |
            export JAVA_HOME=/usr/local/openjdk25
            export PATH=$JAVA_HOME/bin:$PATH
            ./mvnw test -Paggregate-coverage -B
      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: freebsd

  # OpenBSD VM, JDK 25. Same pattern as FreeBSD above.
  testopenbsd:
    runs-on: ubuntu-24.04
    name: Test JDK 25, OpenBSD (+ JNA==FFM)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Test on OpenBSD with aggregate coverage
        id: test-openbsd
        uses: vmactions/openbsd-vm@18edb32f4e48dae5865d7b8b3a9587bc01218a20 # v1
        with:
          release: "7.9"
          usesh: false
          mem: 2048
          copyback: true
          prepare: |
            pkg_add curl
            pkg_add jdk%25
            pkg_add maven
          run: |
            mvn test -Paggregate-coverage -B
      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: openbsd

  # OpenIndiana (illumos/Solaris) VM, JDK 25. Same pattern as FreeBSD/OpenBSD above.
  # Bumped VM RAM and capped JVM heap so back-to-back module test runs (JNA + FFM)
  # don't exhaust illumos's native-memory pool.
  testopenindiana:
    runs-on: ubuntu-24.04
    name: Test JDK 25, OpenIndiana (+ JNA==FFM)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Test on OpenIndiana with aggregate coverage
        id: test-openindiana
        uses: vmactions/openindiana-vm@3248e8c61485588528c034a4285242f77efd8b97 # v1
        with:
          mem: 12288
          # Cap below the runner's core count: shrinks libumem's per-CPU arenas and
          # the JVM common ForkJoinPool (OSHI .parallel() streams), reducing the
          # thread fan-out that drives the native-memory OOMs.
          cpu: 2
          copyback: true
          prepare: |
            pkg install openjdk25
          run: |
            export JAVA_HOME=/usr/jdk/openjdk25
            export PATH=$JAVA_HOME/bin:$PATH
            # illumos OOMs here are native memory (thread stacks + GC/JIT/metaspace),
            # not Java heap. Cap every native pool that grows with thread fan-out and
            # use SerialGC (no parallel GC threads/structures) to keep the footprint flat.
            # _JAVA_OPTIONS reaches the Maven JVM and the forked test JVM alike.
            export _JAVA_OPTIONS="-Xmx1g -Xss512k -XX:MaxMetaspaceSize=256m -XX:ReservedCodeCacheSize=128m -XX:+UseSerialGC"
            # OpenIndiana-only: same parallelism cap as unix.yaml. illumos
            # libumem reserves per-CPU arenas; vthread-style unbounded fan-out
            # on blocking JNA exec calls trips Native memory allocation OOMs.
            ./mvnw clean test -Paggregate-coverage -B -Dmaven.gitcommitid.skip=true \
              -Djunit.parallel.executor-service=FORK_JOIN_POOL \
              -Djunit.parallel.strategy=fixed \
              -Djunit.parallel.fixed.parallelism=1 \
              -Djunit.parallel.fixed.max-pool-size=2
      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: solaris
