# Limited CI matrix on all pull requests to any branch
name: Pull Request CI

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.yml'
      - '**.yaml'

jobs:
  # Static analysis: formatting, style, API restrictions, and javadoc link validity.
  # Runs once on ubuntu/JDK 25 (javadoc for oshi-core-ffm requires JDK 25).
  lint:
    runs-on: ubuntu-latest
    name: Lint (Spotless, Checkstyle, ForbiddenAPIs, Javadoc)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: 'zulu'
          cache: 'maven'
      - name: Install
        run: ./mvnw install -DskipTests -q
      - name: Spotless
        run: ./mvnw spotless:check
      - name: Checkstyle
        run: ./mvnw checkstyle:check
      - name: Forbidden APIs
        run: ./mvnw forbiddenapis:check forbiddenapis:testCheck
      - name: Javadoc
        run: ./mvnw javadoc:javadoc -DskipTests

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java: [11, 21, 25]
        include:
          - os: ubuntu-latest
            coverage-flag: linux
          - os: macos-latest
            coverage-flag: macos
          - os: windows-latest
            coverage-flag: windows
      fail-fast: false
    name: Test JDK ${{ matrix.java }}, ${{ matrix.os }}${{ contains(matrix.java, '25') && ' (+ JNA==FFM)' || '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'zulu'
          cache: 'maven'
      - name: Test with Maven
        if: ${{ !contains(matrix.java, '25') }}
        run: ./mvnw test -B
      - name: Test with Maven (Compare JNA/FFM and aggregate coverage)
        if: contains(matrix.java, '25')
        run: ./mvnw test -Paggregate-coverage -B
      - name: Upload Coverage
        if: always() && contains(matrix.java, '25')
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: ${{ matrix.coverage-flag }}

  # JMH performance benchmarks — separate job to avoid slowing down test+coverage
  benchmarks:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    name: JMH Benchmarks, ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: 'zulu'
          cache: 'maven'
      - name: Build benchmark jar
        run: ./mvnw package -pl oshi-benchmark -am "-DskipTests" "-Dshade.phase=package" -q
      - name: Run JMH Benchmarks (JNA vs FFM)
        run: java -jar oshi-benchmark/target/benchmarks.jar -wi 1 -i 3 -f 1
