# Limited CI matrix on all pull requests to any branch
name: Pull Request CI

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.yml'
      - '**.yaml'

jobs:
  # Static analysis: formatting, style, API restrictions, and javadoc link validity.
  # Runs once on ubuntu/JDK 25 (javadoc for oshi-core-ffm requires JDK 25).
  lint:
    runs-on: ubuntu-latest
    name: Lint (Spotless, Checkstyle, ForbiddenAPIs, Javadoc)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: 'zulu'
          cache: 'maven'
      - name: Install
        run: ./mvnw install -DskipTests -q
      - name: Spotless
        run: ./mvnw spotless:check
      - name: Checkstyle
        run: ./mvnw checkstyle:check
      - name: Forbidden APIs
        run: ./mvnw forbiddenapis:check forbiddenapis:testCheck
      - name: Javadoc
        run: ./mvnw javadoc:javadoc -DskipTests

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java: [21, 25, 26]
        include:
          - os: ubuntu-latest
            coverage-flag: linux
          - os: macos-latest
            coverage-flag: macos
          - os: windows-latest
            coverage-flag: windows
      fail-fast: false
    name: Test JDK ${{ matrix.java }}, ${{ matrix.os }}${{ contains(matrix.java, '25') && ' (+ JNA==FFM)' || '' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'zulu'
          cache: 'maven'
      - name: Test with Maven
        if: ${{ !contains(matrix.java, '25') }}
        run: ./mvnw test -B
      - name: Test with Maven (Compare JNA/FFM and aggregate coverage)
        if: contains(matrix.java, '25')
        run: ./mvnw test -Paggregate-coverage -B
      - name: Upload Coverage
        if: always() && contains(matrix.java, '25')
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: ${{ matrix.coverage-flag }}

  # FreeBSD VM, JDK 25. Separate from the main matrix because vmactions/freebsd-vm
  # runs inside a nested VM on ubuntu-latest. Aggregate coverage is uploaded to
  # Codecov under the `freebsd` flag — this is the only PR job that exercises
  # the FreeBSD-specific classes.
  testfreebsd:
    runs-on: ubuntu-24.04
    name: Test JDK 25, FreeBSD (+ JNA==FFM)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Test in FreeBSD with aggregate coverage
        id: test-freebsd
        uses: vmactions/freebsd-vm@a6de9343ef5747433d9c25784c90e84998b9d69a # v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg install -y curl
            pkg install -y openjdk25
          run: |
            export JAVA_HOME=/usr/local/openjdk25
            export PATH=$JAVA_HOME/bin:$PATH
            ./mvnw test -Paggregate-coverage -B
      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: freebsd

  # OpenBSD VM, JDK 25. Same pattern as FreeBSD above.
  testopenbsd:
    runs-on: ubuntu-24.04
    name: Test JDK 25, OpenBSD (+ JNA==FFM)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Test on OpenBSD with aggregate coverage
        id: test-openbsd
        uses: vmactions/openbsd-vm@fcf799d7ce9c305ad89eabef1fb2fa5c1c42d0ee # v1
        with:
          release: "7.9"
          usesh: false
          mem: 2048
          copyback: true
          prepare: |
            pkg_add curl
            pkg_add jdk%25
            pkg_add maven
          run: |
            mvn test -Paggregate-coverage -B
      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: openbsd

  # OpenIndiana (illumos/Solaris) VM, JDK 25. Same pattern as FreeBSD/OpenBSD above.
  # Bumped VM RAM and capped JVM heap so back-to-back module test runs (JNA + FFM)
  # don't exhaust illumos's native-memory pool.
  testopenindiana:
    runs-on: ubuntu-24.04
    name: Test JDK 25, OpenIndiana (+ JNA==FFM)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Test on OpenIndiana with aggregate coverage
        id: test-openindiana
        uses: vmactions/openindiana-vm@5ecd04945b8ac6c9b82248324912326a4d065094 # v1
        with:
          mem: 8192
          copyback: true
          prepare: |
            pkg install openjdk25
          run: |
            export JAVA_HOME=/usr/jdk/openjdk25
            export PATH=$JAVA_HOME/bin:$PATH
            export MAVEN_OPTS="-Xmx1g"
            export _JAVA_OPTIONS="-Xmx1g"
            ./mvnw test -Paggregate-coverage -B -Dmaven.gitcommitid.skip=true
      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: solaris

  # JMH performance benchmarks — separate job to avoid slowing down test+coverage
  benchmarks:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    name: JMH Benchmarks, ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: 'zulu'
          cache: 'maven'
      - name: Build benchmark jar
        run: ./mvnw package -pl oshi-benchmark -am "-DskipTests" "-Dshade.phase=package" -q
      - name: Run JMH Benchmarks (JNA vs FFM)
        run: java -jar oshi-benchmark/target/benchmarks.jar -wi 1 -i 3 -f 1
