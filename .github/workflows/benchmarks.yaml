# Manual JMH benchmark capture across every platform OSHI runs JMH on.
#
# Runs only on workflow_dispatch so it doesn't burn CI time on every push/PR.
# Intended for occasional re-capture of the numbers reported in PERFORMANCE.md
# (e.g. when adding a new platform or making a perf-relevant change).
#
# Native runners (Linux/macOS/Windows) produce stable numbers; FreeBSD,
# OpenBSD and OpenIndiana all run inside a nested QEMU VM on an Ubuntu runner,
# so absolute numbers are noisier and only the relative JNA-vs-FFM comparison
# within a single run is meaningful. illumos is especially fragile under
# back-to-back JMH JVM forks (native malloc pool), so its VM mem is bumped.
name: Benchmarks (manual)

on:
  workflow_dispatch:

# Default-deny at the workflow level; each checkout-using job re-grants only
# what it needs. benchaix is SSH-only and gets no grants.
permissions: {}

jobs:
  benchlinux:
    name: JMH benchmarks, Linux
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: 25
          distribution: 'zulu'
          cache: 'maven'
      - name: Build benchmark jar
        run: ./mvnw package -pl oshi-benchmark -am -DskipTests -Dshade.phase=package -q
      - name: Run JMH benchmarks
        run: java -jar oshi-benchmark/target/benchmarks.jar -wi 1 -i 3 -f 1

  benchmacos:
    name: JMH benchmarks, macOS
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: 25
          distribution: 'zulu'
          cache: 'maven'
      - name: Build benchmark jar
        run: ./mvnw package -pl oshi-benchmark -am -DskipTests -Dshade.phase=package -q
      - name: Run JMH benchmarks
        run: java -jar oshi-benchmark/target/benchmarks.jar -wi 1 -i 3 -f 1

  benchwindows:
    name: JMH benchmarks, Windows
    runs-on: windows-2025
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: 25
          distribution: 'temurin'
          cache: 'maven'
      - name: Build benchmark jar
        run: ./mvnw package -pl oshi-benchmark -am "-DskipTests" "-Dshade.phase=package" -q
      - name: Run JMH benchmarks
        run: java -jar oshi-benchmark/target/benchmarks.jar -wi 1 -i 3 -f 1

  benchfreebsd:
    name: JMH benchmarks, FreeBSD
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Benchmark on FreeBSD
        uses: vmactions/freebsd-vm@a46f291854f624412f94e37b2e6ba64bdb52b5dd # v1
        with:
          usesh: true
          prepare: |
            pkg install -y curl
            pkg install -y openjdk25
          run: |
            export JAVA_HOME=/usr/local/openjdk25
            export PATH=$JAVA_HOME/bin:$PATH
            ./mvnw package -pl oshi-benchmark -am -DskipTests -Dshade.phase=package -q -B
            java -jar oshi-benchmark/target/benchmarks.jar -wi 1 -i 3 -f 1

  benchopenbsd:
    name: JMH benchmarks, OpenBSD
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Benchmark on OpenBSD
        uses: vmactions/openbsd-vm@c941015845c0f0c429676840963dc63b226d4f69 # v1
        with:
          release: "7.9"
          usesh: false
          mem: 4096
          prepare: |
            pkg_add curl
            pkg_add jdk%25
            pkg_add maven
          run: |
            # `pkg_add maven` wraps mvn with its own JAVA_HOME shim, but a bare
            # `java` invocation needs PATH/JAVA_HOME set explicitly.
            export JAVA_HOME=/usr/local/jdk-25
            export PATH=$JAVA_HOME/bin:$PATH
            mvn package -pl oshi-benchmark -am -DskipTests -Dshade.phase=package -q -B
            java -jar oshi-benchmark/target/benchmarks.jar -wi 1 -i 3 -f 1

  benchaix:
    # SSH into the same cfarm AIX 7.3 box the regular Cfarm CI job uses. Same
    # JNA stable-load gymnastics: libjnidispatch.a gets pre-extracted to a
    # known cache path so the test JVM can System.load() it directly. Without
    # this, OpenJ9 occasionally fails the per-PID jar-unpack with EBUSY.
    name: JMH benchmarks, AIX
    concurrency: aix_cfarm119
    runs-on: ubuntu-latest
    steps:
    - name: Benchmark on AIX
      uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
      env:
        REPO_URL: https://github.com/${{ github.repository }}
        BRANCH: ${{ github.ref_name }}
      with:
        host: cfarm119.cfarm.net
        username: oshi
        key: ${{ secrets.GCC_CI_KEY }}
        port: 22
        command_timeout: 30m
        envs: REPO_URL,BRANCH
        script: |
          set -e
          rm -fR ~/javashared*
          cd ~/git/oshi
          export JAVA_HOME=~/java/jdk-25.0.3+9
          export PATH=$PATH:/opt/freeware/bin
          export MAVEN_OPTS="-Xshareclasses:none"
          # Fetch + reset to the triggering ref regardless of local state.
          # FETCH_HEAD avoids touching the cfarm clone's named branches.
          git fetch "$REPO_URL" "$BRANCH"
          git reset --hard FETCH_HEAD
          # mvnw hash_string() overflows AIX ksh arithmetic; use mvn directly
          MAVEN_VERSION=3.9.15
          MAVEN_DIR=/home/oshi/software/apache-maven-$MAVEN_VERSION
          if [ ! -d "$MAVEN_DIR" ]; then
            mkdir -p /home/oshi/software
            wget https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/$MAVEN_VERSION/apache-maven-$MAVEN_VERSION-bin.tar.gz -nv -O /tmp/maven.tar.gz
            gunzip -f /tmp/maven.tar.gz
            cd /home/oshi/software && tar xf /tmp/maven.tar && rm /tmp/maven.tar
            cd ~/git/oshi
          fi
          export PATH=$MAVEN_DIR/bin:$PATH
          # Pre-extract libjnidispatch.a (see cfarm.yaml testaix for the long form).
          JNA_CACHE=/home/oshi/.cache/jna
          JNA_LIB=$JNA_CACHE/libjnidispatch.a
          mkdir -p "$JNA_CACHE"
          JNA_VERSION=$(mvn -q -N help:evaluate -Dexpression=jna.version -DforceStdout 2>/dev/null)
          JNA_JAR=$HOME/.m2/repository/net/java/dev/jna/jna/$JNA_VERSION/jna-$JNA_VERSION.jar
          if [ ! -f "$JNA_JAR" ]; then
            mvn -q -N dependency:get -Dartifact=net.java.dev.jna:jna:$JNA_VERSION -Dmaven.gitcommitid.skip=true
          fi
          if [ ! -f "$JNA_LIB" ] || [ "$JNA_JAR" -nt "$JNA_LIB" ]; then
            rm -rf /tmp/jna-extract && mkdir -p /tmp/jna-extract
            (cd /tmp/jna-extract && jar xf "$JNA_JAR" com/sun/jna/aix-ppc64/libjnidispatch.a)
            mv /tmp/jna-extract/com/sun/jna/aix-ppc64/libjnidispatch.a "$JNA_LIB"
            rm -rf /tmp/jna-extract
            ln -sf libjnidispatch.a "$JNA_CACHE/libjnidispatch.so"
          fi
          export _JAVA_OPTIONS="-Djna.boot.library.path=$JNA_CACHE"
          # Build the shaded benchmark jar then run JMH. The benchmark classes
          # themselves have no platform gate; they instantiate both
          # oshi.SystemInfo and oshi.ffm.SystemInfo unconditionally.
          mvn package -pl oshi-benchmark -am -DskipTests -Dshade.phase=package -q -B -Dmaven.gitcommitid.skip=true
          # Explicit $JAVA_HOME/bin/java: /opt/freeware/bin on AIX shadows
          # `java` with the OS-bundled Java 8, which doesn't recognize
          # --enable-native-access (added in JDK 17) — the flag the
          # @Fork(jvmArgsPrepend = "--enable-native-access=ALL-UNNAMED")
          # annotation passes to JMH forks. Launching via the JDK 25 binary
          # makes JMH set java.home to JDK 25 so forks inherit the same.
          $JAVA_HOME/bin/java -jar oshi-benchmark/target/benchmarks.jar -wi 1 -i 3 -f 1

  benchopenindiana:
    name: JMH benchmarks, OpenIndiana
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Benchmark on OpenIndiana
        uses: vmactions/openindiana-vm@3248e8c61485588528c034a4285242f77efd8b97 # v1
        with:
          # Bumped above the 8 GB used by the regular CI job because JMH forks
          # a fresh JVM per benchmark and illumos's native malloc pool is the
          # OOM bottleneck under back-to-back forks.
          mem: 12288
          prepare: |
            pkg install openjdk25
          run: |
            export JAVA_HOME=/usr/jdk/openjdk25
            export PATH=$JAVA_HOME/bin:$PATH
            export MAVEN_OPTS="-Xmx1g"
            export _JAVA_OPTIONS="-Xmx1g"
            ./mvnw package -pl oshi-benchmark -am -DskipTests -Dshade.phase=package -q -B -Dmaven.gitcommitid.skip=true
            java -jar oshi-benchmark/target/benchmarks.jar -wi 1 -i 3 -f 1
