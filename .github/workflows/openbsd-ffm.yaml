# TEMPORARY CI for the OpenBSD FFM port effort (oshi/oshi#3332).
# Triggers on push to the long-lived `openbsd-ffm` development branch so
# in-progress work gets OpenBSD VM coverage between PR submissions. Remove
# this file when the FFM port wraps up.
name: OpenBSD FFM CI (temporary)

on:
  workflow_dispatch:
  push:
    branches:
      - openbsd-ffm

jobs:
  testopenbsd:
    runs-on: ubuntu-24.04
    name: Test JDK 25, OpenBSD
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Test on OpenBSD
        id: test-openbsd
        uses: vmactions/openbsd-vm@fcf799d7ce9c305ad89eabef1fb2fa5c1c42d0ee # v1
        with:
          release: "7.9"
          usesh: false
          mem: 2048
          prepare: |
            pkg_add curl
            pkg_add jdk%25
            pkg_add maven
          run: |
            mvn clean test -B -Djacoco.skip=true
