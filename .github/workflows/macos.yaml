# Full CI matrix on all pushes to master branch
name: macOS CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '**.yml'
      - '**.yaml'

jobs:
  # Runs full project on multiple JDKs
  testmatrix:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Baseline support, Current LTS, Current GA, Current EA
        java: [11, 21, 25]
        os: [macos-14, macos-15, macos-26]
        include:
          - java: 17
            os: 'macos-26-intel'
      fail-fast: false
    name: JDK ${{ matrix.java }}, ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'zulu'
          cache: 'maven'
      - name: Test with Maven
        if: ${{ !contains(matrix.java, '25') }}
        run: ./mvnw clean test -B
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Test with Maven (aggregate coverage)
        if: contains(matrix.java, '25')
        run: ./mvnw clean test -Paggregate-coverage -B
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Coverage
        if: always() && contains(matrix.java, '25') && contains(matrix.os, 'macos-15')
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: macos
      - name: JMH Benchmarks (JNA vs FFM)
        if: contains(matrix.java, '25')
        run: |
          ./mvnw package -pl oshi-benchmark -am -DskipTests -Dshade.phase=package -q
          java -jar oshi-benchmark/target/benchmarks.jar -wi 1 -i 3 -f 1
