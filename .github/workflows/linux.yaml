# Full CI matrix on all pushes to master branch
name: Linux CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '**.yml'
      - '**.yaml'

jobs:
  # Static analysis: formatting, style, API restrictions, and javadoc link validity.
  # Runs once on ubuntu/JDK 25 (javadoc for oshi-core-ffm requires JDK 25).
  lint:
    runs-on: ubuntu-latest
    name: Lint (Spotless, Checkstyle, ForbiddenAPIs, Javadoc)
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'zulu'
          cache: 'maven'
      - name: Install
        run: ./mvnw install -DskipTests -q
      - name: Spotless
        run: ./mvnw spotless:check
      - name: Checkstyle
        run: ./mvnw checkstyle:check
      - name: Forbidden APIs
        run: ./mvnw forbiddenapis:check forbiddenapis:testCheck
      - name: Javadoc
        run: ./mvnw javadoc:javadoc -DskipTests

  # Runs full project on multiple JDKs
  testmatrix:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        java: [11, 21, 25]
        os: [ubuntu-latest]
        include:
          - java: 17
            os: 'ubuntu-24.04-arm'
      fail-fast: false
    name: JDK ${{ matrix.java }}, ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'zulu'
          cache: 'maven'
      - name: Install with Maven
        if: ${{ !contains(matrix.java, '25') }}
        run: ./mvnw install -DskipTests -B
      - name: Test with Maven
        if: ${{ !contains(matrix.java, '25') }}
        run: ./mvnw test -B
      - name: Test with Maven (aggregate coverage)
        if: contains(matrix.java, '25')
        run: ./mvnw test -Paggregate-coverage -B
      - name: Upload Coverage
        if: always() && contains(matrix.java, '25')
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: linux

  # Cgroup integration test — runs inside a Docker container with known resource limits
  container-cgroup:
    runs-on: ubuntu-latest
    name: Container Cgroup Test
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'zulu'
          cache: 'maven'
      - name: Build oshi-common
        run: ./mvnw install -pl oshi-common -am -DskipTests -q
      - name: Run cgroup tests in constrained container
        run: |
          docker run --rm \
            --cpus="1.5" \
            --memory="512m" \
            --pids-limit=256 \
            -e OSHI_CGROUP_TEST=true \
            -v "${{ github.workspace }}":/workspace \
            -v "$HOME/.m2":/root/.m2 \
            -w /workspace \
            eclipse-temurin:17-jdk \
            ./mvnw test -pl oshi-common -am -B

  # JMH performance benchmarks — separate job to avoid slowing down test+coverage
  benchmarks:
    runs-on: ubuntu-latest
    name: JMH Benchmarks
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'zulu'
          cache: 'maven'
      - name: Build benchmark jar
        run: ./mvnw package -pl oshi-benchmark -am -DskipTests -Dshade.phase=package -q
      - name: Run JMH Benchmarks (JNA vs FFM)
        run: java -jar oshi-benchmark/target/benchmarks.jar -wi 1 -i 3 -f 1
