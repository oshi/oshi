# TEMPORARY CI for the FreeBSD FFM port effort (oshi/oshi#3315).
# Runs the test suite under FreeBSD on every push to `freebsd-ffm` and on PRs
# targeting that branch, since the standard PR workflow does not exercise
# FreeBSD. Intentionally NOT fork-gated so PR runs surface results back to the
# PR. Remove this file when the FreeBSD FFM port merges to master.
name: FreeBSD FFM CI (temporary)

on:
  workflow_dispatch:
  push:
    branches:
      - freebsd-ffm
  pull_request:
    branches:
      - freebsd-ffm

jobs:
  # Runs the full reactor under JDK 25 on FreeBSD with the aggregate-coverage
  # profile so JaCoCo data flows to Codecov for FreeBSD-specific classes —
  # which the standard PR workflow cannot exercise. Mirrors the pattern used
  # by macos.yaml / linux.yaml / pr.yaml.
  testfreebsd:
    name: Test JDK 25, FreeBSD (aggregate coverage)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Test in FreeBSD with aggregate coverage
        id: test-freebsd
        uses: vmactions/freebsd-vm@a6de9343ef5747433d9c25784c90e84998b9d69a # v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg install -y curl
            pkg install -y openjdk25
          run: |
            export JAVA_HOME=/usr/local/openjdk25
            export PATH=$JAVA_HOME/bin:$PATH
            java -version
            ./mvnw clean test -Paggregate-coverage -B
      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: freebsd
