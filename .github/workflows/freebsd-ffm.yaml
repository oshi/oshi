# TEMPORARY CI for the FreeBSD FFM port effort (oshi/oshi#3315).
# Runs the test suite under FreeBSD on every push to `freebsd-ffm` and on PRs
# targeting that branch, since the standard PR workflow does not exercise
# FreeBSD. Intentionally NOT fork-gated so PR runs surface results back to the
# PR. Remove this file when the FreeBSD FFM port merges to master.
name: FreeBSD FFM CI (temporary)

on:
  workflow_dispatch:
  push:
    branches:
      - freebsd-ffm
  pull_request:
    branches:
      - freebsd-ffm

jobs:
  # Exercises the FFM module path under JDK 25 on FreeBSD. This is the path
  # under active development; failures here are the signal we care about most.
  testfreebsd-ffm:
    name: Test JDK 25, FreeBSD (FFM modules)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Test FFM modules in FreeBSD
        id: test-freebsd-ffm
        uses: vmactions/freebsd-vm@a6de9343ef5747433d9c25784c90e84998b9d69a # v1
        with:
          usesh: true
          prepare: |
            pkg install -y curl
            pkg install -y openjdk25
          run: |
            export JAVA_HOME=/usr/local/openjdk25
            export PATH=$JAVA_HOME/bin:$PATH
            java -version
            ./mvnw -pl oshi-common,oshi-core-ffm -am clean test -B -Djacoco.skip=true

  # Regression guard: makes sure the existing JNA path on oshi-core still
  # passes on FreeBSD while we hoist code into oshi-common during the port.
  testfreebsd-jna:
    name: Test JDK 25, FreeBSD (oshi-core regression)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Test oshi-core in FreeBSD
        id: test-freebsd-jna
        uses: vmactions/freebsd-vm@a6de9343ef5747433d9c25784c90e84998b9d69a # v1
        with:
          usesh: true
          prepare: |
            pkg install -y curl
            pkg install -y openjdk25
          run: |
            export JAVA_HOME=/usr/local/openjdk25
            export PATH=$JAVA_HOME/bin:$PATH
            java -version
            ./mvnw -pl oshi-core -am clean test -B -Djacoco.skip=true
