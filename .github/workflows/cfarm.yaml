# CI on cfarm physical machines (AIX, Solaris SPARC)
name: Cfarm CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '**.yml'
      - '**.yaml'

# Default-deny at the workflow level. Both jobs SSH into cfarm hosts and never
# touch GITHUB_TOKEN, so no per-job grants are needed.
permissions: {}

# These boxes are a shared physical resource. GitHub's concurrency group keeps
# same-repo runs from overlapping, but it is per-repository, so a fork dispatch
# and an upstream run can still land on the same host. To make that survivable
# (rather than prevent it with an on-box lock) each run, before building:
#   * reaps stale JVMs left by a previously killed run (their open handles can
#     block git clean / mvn clean on the shared, possibly NFS-backed workspace),
#   * git clean -xffd to drop any leftover build output, and
#   * bounds the build wall-clock below the ssh command_timeout with `timeout`
#     so a hung/cancelled run tears down its own process tree instead of
#     orphaning a JVM for the next run to trip over.

jobs:
  # Tests the triggering ref on Solaris 11.4 SPARC: master on push, or the
  # dispatched branch (possibly from a fork) on workflow_dispatch. Retries
  # once for the occasional junit-platform-maven-test flake.
  testsolaris_sparc:
    # The cfarm hosts are a shared physical resource and the concurrency group
    # above is per-repository, so it can't serialize an upstream push against a
    # fork's push run -- which fire together whenever a fork's master is synced.
    # Two runs then share ~/git/oshi and clobber each other's target/classes
    # (e.g. "package oshi.driver.common.X does not exist" on the loser). Only the
    # canonical repo runs on push; forks keep workflow_dispatch for branch tests.
    if: github.event_name == 'workflow_dispatch' || github.repository == 'oshi/oshi'
    name: Test JDK 17, Solaris SPARC
    concurrency: solaris_cfarm216
    runs-on: ubuntu-latest
    steps:
    - name: Test in Solaris SPARC
      uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
      env:
        REPO_URL: https://github.com/${{ github.repository }}
        BRANCH: ${{ github.ref_name }}
      with:
        host: cfarm216.cfarm.net
        username: oshi
        key: ${{ secrets.GCC_CI_KEY }}
        port: 22
        command_timeout: 25m
        envs: REPO_URL,BRANCH
        script: |
          set -e
          source .profile
          # Backup reaper: kill stale JVMs from a previously killed run (older
          # than the build budget) so they can't hold the workspace hostage.
          for pid in $(ps -u oshi -o pid=,etime=,comm= 2>/dev/null | awk '$3 ~ /java/ {
                et=$2; n=split(et,a,/[-:]/);
                m=(et ~ /-/)?999:(n==3?a[1]*60+a[2]:a[1]);
                if (m>=20) print $1 }'); do
            kill -9 "$pid" 2>/dev/null || true
          done
          cd ~/oshi
          # Fetch + reset to the triggering ref regardless of local state.
          # FETCH_HEAD avoids touching the cfarm clone's named branches.
          git fetch "$REPO_URL" "$BRANCH"
          git reset --hard FETCH_HEAD
          # Force-remove leftover build output (incl. NFS .nfs* sillyrenames).
          git clean -xffd
          # Reap the build's process group on exit (orphaned test JVMs) while
          # shielding this shell so the build's real exit code is preserved.
          trap 'ec=$?; trap "" TERM; kill 0 2>/dev/null; exit $ec' EXIT
          set +e
          # One wall-clock budget for both attempts, kept under command_timeout
          # so the box self-terminates first and leaves no orphan.
          BUILD='./mvnw clean test -B -Djacoco.skip=true || { sleep 15; ./mvnw clean test -B -Djacoco.skip=true; }'
          if command -v timeout >/dev/null 2>&1; then
            timeout --kill-after=30s 20m sh -c "$BUILD"
          else
            sh -c "$BUILD"
          fi
          exit $?

  # Tests the triggering ref on AIX 7.3: master on push, or the dispatched
  # branch (possibly from a fork) on workflow_dispatch.
  # JNA's library is pre-extracted to ~/.cache/jna so the test JVM loads it
  # directly via System.load(); the JAR-unpack step is the flaky one on OpenJ9.
  testaix:
    # See testsolaris_sparc: skip fork push runs (they race the upstream run on
    # the shared box); forks keep workflow_dispatch for branch tests.
    if: github.event_name == 'workflow_dispatch' || github.repository == 'oshi/oshi'
    name: Test JDK 25, AIX
    concurrency: aix_cfarm119
    runs-on: ubuntu-latest
    steps:
    - name: Test in AIX
      uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
      env:
        REPO_URL: https://github.com/${{ github.repository }}
        BRANCH: ${{ github.ref_name }}
      with:
        host: cfarm119.cfarm.net
        username: oshi
        key: ${{ secrets.GCC_CI_KEY }}
        port: 22
        command_timeout: 15m
        envs: REPO_URL,BRANCH
        script: |
          # Backup reaper: kill stale JVMs from a previously killed run (older
          # than the build budget) so their open handles don't block git clean /
          # mvn clean on the shared (possibly NFS) workspace.
          for pid in $(ps -u oshi -o pid=,etime=,comm= 2>/dev/null | awk '$3 ~ /java/ {
                et=$2; n=split(et,a,/[-:]/);
                m=(et ~ /-/)?999:(n==3?a[1]*60+a[2]:a[1]);
                if (m>=13) print $1 }'); do
            kill -9 "$pid" 2>/dev/null || true
          done
          rm -fR ~/javashared*
          cd ~/git/oshi
          export JAVA_HOME=~/java/jdk-25.0.3+9
          export PATH=$PATH:/opt/freeware/bin
          export MAVEN_OPTS="-Xshareclasses:none"
          # Fetch + reset to the triggering ref regardless of local state.
          # FETCH_HEAD avoids touching the cfarm clone's named branches.
          git fetch "$REPO_URL" "$BRANCH"
          git reset --hard FETCH_HEAD
          # Force-remove leftover build output (incl. NFS .nfs* sillyrenames).
          git clean -xffd
          # mvnw hash_string() overflows AIX ksh arithmetic; use mvn directly
          MAVEN_VERSION=3.9.15
          MAVEN_DIR=/home/oshi/software/apache-maven-$MAVEN_VERSION
          if [ ! -d "$MAVEN_DIR" ]; then
            mkdir -p /home/oshi/software
            wget https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/$MAVEN_VERSION/apache-maven-$MAVEN_VERSION-bin.tar.gz -nv -O /tmp/maven.tar.gz
            gunzip -f /tmp/maven.tar.gz
            cd /home/oshi/software && tar xf /tmp/maven.tar && rm /tmp/maven.tar
            cd ~/git/oshi
          fi
          export PATH=$MAVEN_DIR/bin:$PATH
          # Pre-extract libjnidispatch.a to a stable path so the test JVM can
          # System.load() it directly. JNA's default behavior is to unpack the
          # library from the jar with a fresh per-PID filename on every JVM
          # start, which is what flakes on OpenJ9. Use 'jar' (always shipped
          # with the JDK) to avoid depending on AIX-side 'unzip' or 'sort -V'.
          JNA_CACHE=/home/oshi/.cache/jna
          JNA_LIB=$JNA_CACHE/libjnidispatch.a
          mkdir -p "$JNA_CACHE"
          JNA_VERSION=$(mvn -q -N help:evaluate -Dexpression=jna.version -DforceStdout 2>/dev/null)
          JNA_JAR=$HOME/.m2/repository/net/java/dev/jna/jna/$JNA_VERSION/jna-$JNA_VERSION.jar
          if [ ! -f "$JNA_JAR" ]; then
            mvn -q -N dependency:get -Dartifact=net.java.dev.jna:jna:$JNA_VERSION -Dmaven.gitcommitid.skip=true
          fi
          if [ ! -f "$JNA_LIB" ] || [ "$JNA_JAR" -nt "$JNA_LIB" ]; then
            # Extract into a per-run scratch dir on the SAME filesystem as the
            # cache so the final install is an atomic rename -- concurrency-safe
            # even if two runs populate at once (no shared /tmp scratch to race).
            SCRATCH=$(mktemp -d "$JNA_CACHE/.extract.XXXXXX")
            (cd "$SCRATCH" && jar xf "$JNA_JAR" com/sun/jna/aix-ppc64/libjnidispatch.a)
            mv "$SCRATCH/com/sun/jna/aix-ppc64/libjnidispatch.a" "$JNA_LIB"
            # Expose under both names in case the JVM's mapLibraryName picks .so
            ln -sf libjnidispatch.a "$JNA_CACHE/libjnidispatch.so"
            rm -rf "$SCRATCH"
          fi
          # jna.boot.library.path tells JNA to System.load() the pre-extracted
          # file first; we deliberately do NOT set jna.nounpack so JNA can still
          # fall back to JAR extraction if the boot-path load ever fails.
          export _JAVA_OPTIONS="-Djna.boot.library.path=$JNA_CACHE"
          # Reap the build's process group on exit (orphaned test JVMs) while
          # shielding this shell so the build's real exit code is preserved.
          trap 'ec=$?; trap "" TERM; kill 0 2>/dev/null; exit $ec' EXIT
          # One wall-clock budget for both attempts, kept under command_timeout
          # so the box self-terminates first and leaves no orphan.
          BUILD='mvn clean test -B -Djacoco.skip=true || { sleep 15; mvn clean test -B -Djacoco.skip=true; }'
          if command -v timeout >/dev/null 2>&1; then
            timeout --kill-after=30s 12m sh -c "$BUILD"
          else
            sh -c "$BUILD"
          fi
          exit $?
