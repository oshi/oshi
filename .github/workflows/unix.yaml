# CI on Unix OS
name: Unix CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '**.yml'
      - '**.yaml'

jobs:
  # Runs current branch on FreeBSD in a VM, with aggregate-coverage uploaded
  # to Codecov under the `freebsd` flag (no other CI job exercises the
  # FreeBSD-specific classes).
  testfreebsd:
    name: Test JDK 25, FreeBSD
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Test in FreeBSD
        id: test-freebsd
        uses: vmactions/freebsd-vm@a6de9343ef5747433d9c25784c90e84998b9d69a # v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg install -y curl
            pkg install -y openjdk25
          run: |
            export JAVA_HOME=/usr/local/openjdk25
            export PATH=$JAVA_HOME/bin:$PATH
            ./mvnw clean test -Paggregate-coverage -B
      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: freebsd

  # Runs on OpenBSD 7.9 x86 VM
  testopenbsd:
    runs-on: ubuntu-24.04
    name: Test JDK 25, OpenBSD
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Test on OpenBSD
        id: test-openbsd
        uses: vmactions/openbsd-vm@fcf799d7ce9c305ad89eabef1fb2fa5c1c42d0ee # v1
        with:
          release: "7.9"
          usesh: false
          mem: 2048
          prepare: |
            pkg_add curl
            pkg_add jdk%25
            pkg_add maven
          run: |
            mvn clean test -B -Djacoco.skip=true

  # Runs on OpenIndiana (illumos/Solaris) x86 VM
  testopenindiana:
    name: Test JDK 21, OpenIndiana
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Test on OpenIndiana
        id: test-openindiana
        uses: vmactions/openindiana-vm@5ecd04945b8ac6c9b82248324912326a4d065094 # v1
        with:
          prepare: |
            pkg install openjdk21
          run: |
            export JAVA_HOME=/usr/jdk/openjdk21
            export PATH=$JAVA_HOME/bin:$PATH
            java -version
            ./mvnw clean test -B -Djacoco.skip=true -Dmaven.gitcommitid.skip=true

  # Runs current branch on Solaris 11.4 on SPARC
  # Retries flaky test once, possible junit-platform-maven-test issue
  testsolaris_sparc:
    name: Test JDK 17, Solaris SPARC
    concurrency: solaris_cfarm216
    runs-on: ubuntu-latest
    steps:
    - name: Test in Solaris SPARC
      uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
      with:
        host: cfarm216.cfarm.net
        username: oshi
        key: ${{ secrets.GCC_CI_KEY }}
        port: 22
        command_timeout: 25m
        script: |
          set -e
          source .profile
          cd ~/oshi
          git reset --hard
          git checkout master
          git reset --hard HEAD~2
          git pull
          for i in {1..2}; do ./mvnw clean test -B -Djacoco.skip=true && break || sleep 15; done

  # SSH into AIX server and run test on AIX 7.2
  # Configured to pull latest from oshi master branch
  # To test on a PR, log into the aix server and create a new branch
  # Retries up to 3 times due to flaky library loading in OpenJ9
  testaix:
    name: Test JDK 17, AIX
    concurrency: aix_gcc119
    runs-on: ubuntu-latest
    steps:
    - name: Test in AIX
      uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
      with:
        host: gcc119.fsffrance.org
        username: oshi
        key: ${{ secrets.GCC_CI_KEY }}
        port: 22
        command_timeout: 15m
        script: |
          set -e
          rm -fR ~/javashared*
          cd ~/git/oshi
          export JAVA_HOME=~/java/jdk-17.0.8.1+1
          export PATH=$PATH:/opt/freeware/bin
          export MAVEN_OPTS="-Xshareclasses:none -Djna.tmpdir=/home/oshi/.cache/jna"
          git reset --hard
          git checkout master
          git reset --hard HEAD~2
          git pull upstream master
          # mvnw hash_string() overflows AIX ksh arithmetic; use mvn directly
          MAVEN_VERSION=3.9.15
          MAVEN_DIR=/home/oshi/software/apache-maven-$MAVEN_VERSION
          if [ ! -d "$MAVEN_DIR" ]; then
            mkdir -p /home/oshi/software
            wget https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/$MAVEN_VERSION/apache-maven-$MAVEN_VERSION-bin.tar.gz -nv -O /tmp/maven.tar.gz
            gunzip -f /tmp/maven.tar.gz
            cd /home/oshi/software && tar xf /tmp/maven.tar && rm /tmp/maven.tar
            cd ~/git/oshi
          fi
          mkdir -p /home/oshi/.cache/jna
          export PATH=$MAVEN_DIR/bin:$PATH
          mvn clean test -B -Djacoco.skip=true -Djna.tmpdir=/home/oshi/.cache/jna || { sleep 15; mvn clean test -B -Djacoco.skip=true -Djna.tmpdir=/home/oshi/.cache/jna || { sleep 15; mvn clean test -B -Djacoco.skip=true -Djna.tmpdir=/home/oshi/.cache/jna; }; }

  # Runs on DragonFly BSD 6.4 x86 VM
  testdragonflybsd:
    name: Test JDK 21, DragonFly BSD
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Test in DragonFly BSD
        id: test-dragonflybsd
        uses: vmactions/dragonflybsd-vm@b4468429bb9ab60b14600c6eeeb6464427f29391 # v1
        with:
          release: "6.4.2"
          usesh: true
          prepare: |
            pkg install -y curl
            pkg install -y openjdk21
          run: |
            export JAVA_HOME=/usr/local/openjdk21
            export PATH=$JAVA_HOME/bin:$PATH
            mount -t procfs procfs /proc 2>/dev/null || true
            ./mvnw clean test -B -Djacoco.skip=true

  # Runs on NetBSD 10.1 x86 VM without JNA native library
  testnetbsd:
    name: Test JDK 21, NetBSD (VM)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Test in NetBSD
        id: test-netbsd
        uses: vmactions/netbsd-vm@ad31081832386a0ba569aee243e6edf9524f3f80 # v1
        with:
          release: "10.1"
          usesh: true
          prepare: |
            pkg_add curl
            pkg_add openjdk21
          run: |
            export JAVA_HOME=/usr/pkg/java/openjdk21
            export PATH=$JAVA_HOME/bin:$PATH
            mount -t procfs procfs /proc 2>/dev/null || true
            ./mvnw clean test -B -Djacoco.skip=true
