# CI on Unix OS
name: Unix CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '**.yml'
      - '**.yaml'

permissions:
  contents: read

jobs:
  # Runs current branch on FreeBSD in a VM, with aggregate-coverage uploaded
  # to Codecov under the `freebsd` flag (no other CI job exercises the
  # FreeBSD-specific classes).
  testfreebsd:
    name: Test JDK 25, FreeBSD
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Test in FreeBSD
        id: test-freebsd
        uses: vmactions/freebsd-vm@b84ab5559b5a1bb4b8ee2737d2506a16e1737636 # v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg install -y curl
            pkg install -y openjdk25
          run: |
            export JAVA_HOME=/usr/local/openjdk25
            export PATH=$JAVA_HOME/bin:$PATH
            ./mvnw clean test -Paggregate-coverage -B
      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: freebsd

  # Runs on OpenBSD 7.9 x86 VM with aggregate-coverage uploaded
  # to Codecov under the `openbsd` flag.
  testopenbsd:
    runs-on: ubuntu-24.04
    name: Test JDK 25, OpenBSD
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Test on OpenBSD
        id: test-openbsd
        uses: vmactions/openbsd-vm@fcf799d7ce9c305ad89eabef1fb2fa5c1c42d0ee # v1
        with:
          release: "7.9"
          usesh: false
          mem: 2048
          copyback: true
          prepare: |
            pkg_add curl
            pkg_add jdk%25
            pkg_add maven
          run: |
            mvn clean test -Paggregate-coverage -B
      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: openbsd

  # Runs on OpenIndiana (illumos/Solaris) x86 VM with aggregate-coverage uploaded
  # to Codecov under the `solaris` flag.
  testopenindiana:
    name: Test JDK 25, OpenIndiana
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Test on OpenIndiana
        id: test-openindiana
        uses: vmactions/openindiana-vm@3248e8c61485588528c034a4285242f77efd8b97 # v1
        with:
          mem: 12288
          # Cap below the runner's core count: shrinks libumem's per-CPU arenas and
          # the JVM common ForkJoinPool (OSHI .parallel() streams), reducing the
          # thread fan-out that drives the native-memory OOMs.
          cpu: 2
          copyback: true
          prepare: |
            pkg install openjdk25
          run: |
            export JAVA_HOME=/usr/jdk/openjdk25
            export PATH=$JAVA_HOME/bin:$PATH
            # illumos OOMs here are native memory (thread stacks + GC/JIT/metaspace),
            # not Java heap. Cap every native pool that grows with thread fan-out and
            # use SerialGC (no parallel GC threads/structures) to keep the footprint flat.
            # _JAVA_OPTIONS reaches the Maven JVM and the forked test JVM alike.
            export _JAVA_OPTIONS="-Xmx1g -Xss512k -XX:MaxMetaspaceSize=256m -XX:ReservedCodeCacheSize=128m -XX:+UseSerialGC"
            java -version
            # OpenIndiana-only: override the WORKER_THREAD_POOL default to a
            # single-carrier fixed FORK_JOIN_POOL. illumos libumem reserves
            # per-CPU arenas, and vthread-style unbounded fan-out on blocking
            # JNA exec calls trips Native memory allocation OOMs.
            ./mvnw clean test -Paggregate-coverage -B -Dmaven.gitcommitid.skip=true \
              -Djunit.parallel.executor-service=FORK_JOIN_POOL \
              -Djunit.parallel.strategy=fixed \
              -Djunit.parallel.fixed.parallelism=1 \
              -Djunit.parallel.fixed.max-pool-size=2
      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: oshi-benchmark/target/site/jacoco-aggregate/jacoco.xml
          flags: solaris

  # Runs on DragonFly BSD 6.4 x86 VM
  testdragonflybsd:
    name: Test JDK 21, DragonFly BSD
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Test in DragonFly BSD
        id: test-dragonflybsd
        uses: vmactions/dragonflybsd-vm@4ba8127bd95c94b66fc4b885e37c99955ba308ea # v1
        with:
          release: "6.4.2"
          usesh: true
          prepare: |
            pkg install -y curl
            pkg install -y openjdk21
          run: |
            export JAVA_HOME=/usr/local/openjdk21
            export PATH=$JAVA_HOME/bin:$PATH
            mount -t procfs procfs /proc 2>/dev/null || true
            ./mvnw clean test -B -Djacoco.skip=true

  # Runs on NetBSD 10.1 x86 VM without JNA native library
  testnetbsd:
    name: Test JDK 21, NetBSD
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Test in NetBSD
        id: test-netbsd
        uses: vmactions/netbsd-vm@99816dccf75edf233ed6cd00a159e3a5b85ea373 # v1
        with:
          release: "10.1"
          usesh: true
          prepare: |
            pkg_add curl
            pkg_add openjdk21
          run: |
            export JAVA_HOME=/usr/pkg/java/openjdk21
            export PATH=$JAVA_HOME/bin:$PATH
            mount -t procfs procfs /proc 2>/dev/null || true
            ./mvnw clean test -B -Djacoco.skip=true
